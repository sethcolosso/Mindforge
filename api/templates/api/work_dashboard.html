{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Dashboard - MindForge</title>
</head>
<body>
    <h1>Welcome, {{ user.username }} (Professional)</h1>
    <p>Your career: {{ profile.career_type|default:"Not set" }}</p>
    <p>Bio: {{ profile.bio|default:"No bio yet" }}</p>

    <!-- Upload profile form -->
    <form method="post" enctype="multipart/form-data" action="{% url 'profile-update' %}">
        {% csrf_token %}
        <label>Bio:</label><textarea name="bio">{{ profile.bio }}</textarea><br>
        <label>Photo:</label><input type="file" name="profile_photo"><br>
        <label>Visible in search:</label><input type="checkbox" name="is_visible_for_search" {% if profile.is_visible_for_search %}checked{% endif %}><br>
        <button type="submit">Save Profile</button>
    </form>
</body>
</html>
